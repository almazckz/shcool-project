<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Space Terminal</title>
    <style>
        body {
            background: #020617;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            width: 90%;
            max-width: 550px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        h2 { color: #38bdf8; text-align: center; margin-bottom: 20px; font-weight: 400; }
        
        .field-label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; display: block; }
        
        input, textarea {
            width: 100%;
            background: #020617;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        
        textarea { height: 150px; resize: none; line-height: 1.5; }

        .btn-run {
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-run:hover { background: #7dd3fc; transform: translateY(-2px); }

        #response {
            margin-top: 20px;
            padding: 15px;
            background: #020617;
            border-radius: 10px;
            border: 1px solid #1e293b;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
        }
        .loader { color: #fbbf24; text-align: center; display: none; margin-bottom: 10px; }
        .error-msg { color: #f87171; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>GEMINI 2.0 FLASH</h2>
    
    <span class="field-label">API KEY</span>
    <input type="password" id="apiKey" value="AIzaSyBuKzQNRJehQSjlWzgMgSSYzYYe_Zehx8I">
    
    <span class="field-label">ВАШ ЗАПРОС</span>
    <textarea id="prompt" placeholder="Напишите задачу..."></textarea>
    
    <div id="loader" class="loader">Связь установлена, генерирую...</div>
    
    <button class="btn-run" onclick="callGemini()">ЗАПУСТИТЬ</button>

    <div id="response">Консоль готова.</div>
</div>

<script>
    async function callGemini() {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const output = document.getElementById('response');
        const loader = document.getElementById('loader');

        if (!text) return alert('Введите текст!');

        loader.style.display = 'block';
        output.textContent = '...';

        try {
            // ИСПОЛЬЗУЕМ САМУЮ НОВУЮ МОДЕЛЬ GEMINI 2.0 FLASH
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error?.message || 'Ошибка системы');
            }

            output.textContent = data.candidates[0].content.parts[0].text;

        } catch (e) {
            output.innerHTML = `<span class="error-msg">Критическая ошибка: ${e.message}</span><br><br><b>Совет:</b> Попробуйте создать НОВЫЙ ключ в Google AI Studio, этот ключ может быть неактивен.`;
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
