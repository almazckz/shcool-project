<!Kazah AI>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Debug Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #ff9d00;
            font-family: 'Consolas', 'Monaco', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .terminal {
            width: 100%;
            max-width: 600px;
            background: #111;
            border: 2px solid #ff9d00;
            border-radius: 5px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(255, 157, 0, 0.2);
        }
        h2 { font-size: 1.2rem; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: #666; }
        
        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            margin-bottom: 15px;
            outline: none;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #ff9d00; }

        textarea { height: 120px; resize: none; border-left: 3px solid #ff9d00; }

        .btn {
            width: 100%;
            padding: 15px;
            background: #ff9d00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:hover { background: #fff; }

        #output {
            margin-top: 20px;
            padding: 15px;
            background: #050505;
            border: 1px solid #222;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
            color: #00ff41; /* Цвет старого монитора */
        }
        .status { color: #fff; font-size: 11px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>> AI_AUTO_SCANNER_v4.0</h2>
    
    <div class="label">Access_Key</div>
    <input type="password" id="key" placeholder="Enter API Key...">

    <div class="label">Input_Data</div>
    <textarea id="prompt" placeholder="Type your command..."></textarea>

    <div id="status" class="status">Сканирование доступных моделей...</div>

    <button class="btn" onclick="hackGemini()">Execute System</button>

    <div id="output">SYSTEM_READY...</div>
</div>

<script>
    // Подгрузка ключа
    window.onload = () => {
        const saved = localStorage.getItem('master_key');
        if (saved) document.getElementById('key').value = saved;
    };

    async function hackGemini() {
        const key = document.getElementById('key').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('output');
        const status = document.getElementById('status');

        if (!key || !text) return alert('Input missing!');
        localStorage.setItem('master_key', key);

        status.style.display = 'block';
        out.textContent = 'INITIATING SCAN...';

        try {
            // ШАГ 1: Получаем список моделей
            const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const listData = await listRes.json();

            if (!listRes.ok) throw new Error(listData.error?.message || 'Key Error');

            // ШАГ 2: Фильтруем модели, которые могут генерировать текст
            const validModels = listData.models.filter(m => m.supportedGenerationMethods.includes('generateContent'));
            
            if (validModels.length === 0) throw new Error('No models found for this key.');

            status.textContent = `Найдено моделей: ${validModels.length}. Пробую первую...`;

            // ШАГ 3: Пробуем модели по списку, пока одна не сработает
            let finalReply = '';
            for (let model of validModels) {
                try {
                    const genRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model.name}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });
                    
                    const genData = await genRes.json();
                    if (genRes.ok) {
                        finalReply = genData.candidates[0].content.parts[0].text;
                        break; 
                    }
                } catch (e) {
                    console.log(`Model ${model.name} failed, trying next...`);
                }
            }

            if (!finalReply) throw new Error('Все доступные модели вернули ошибку или заняты.');
            out.textContent = finalReply;

        } catch (e) {
            out.innerHTML = `<span style="color:#ff0000">! CRITICAL_ERROR: ${e.message}</span>`;
        } finally {
            status.style.display = 'none';
        }
    }
</script>

</body>
</html>
