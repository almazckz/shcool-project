<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAUHAUS AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #e7e5e4;
            color: #1c1917;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 600px;
            border: 4px solid #1c1917;
            box-shadow: 12px 12px 0px #ef4444; /* Фирменная красная тень */
            padding: 40px;
            position: relative;
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 30px;
            border-bottom: 8px solid #1c1917;
            display: inline-block;
        }

        .input-wrap { margin-bottom: 25px; }
        
        label {
            display: block;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            border: 3px solid #1c1917;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            background: #fff;
        }

        input:focus, textarea:focus {
            background: #fefce8; /* Желтый акцент при фокусе */
        }

        textarea { height: 150px; resize: none; }

        .btn-row { display: flex; gap: 0; border: 3px solid #1c1917; }

        .btn {
            flex: 1;
            padding: 20px;
            border: none;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-black { background: #1c1917; color: #fff; }
        .btn-black:hover { background: #ef4444; }
        .btn-black:active { transform: translate(2px, 2px); }

        .btn-white { background: #fff; color: #1c1917; border-left: 3px solid #1c1917; }
        .btn-white:hover { background: #facc15; }

        #response {
            margin-top: 30px;
            padding: 20px;
            border: 3px solid #1c1917;
            background: #fff;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
            font-weight: 500;
        }

        .loader {
            font-weight: bold;
            color: #ef4444;
            display: none;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .error-box {
            background: #fee2e2;
            color: #b91c1c;
            border: 2px solid #b91c1c;
            padding: 10px;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gen AI<br>Studio</h1>

    <div class="input-wrap">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="Вставьте ваш ключ">
    </div>

    <div class="input-wrap">
        <label>Запрос</label>
        <textarea id="prompt" placeholder="Напишите задание..."></textarea>
    </div>

    <div id="loader" class="loader">● Обработка данных...</div>

    <div class="btn-row">
        <button class="btn btn-black" onclick="sendRequest()">Запустить</button>
        <button class="btn btn-white" onclick="clearAll()">Сброс</button>
    </div>

    <div id="response">Ожидание команды...</div>
</div>

<script>
    // Загружаем ключ из памяти браузера
    window.onload = () => {
        const key = localStorage.getItem('bauhaus_key');
        if (key) document.getElementById('apiKey').value = key;
    };

    function clearAll() {
        document.getElementById('prompt').value = '';
        document.getElementById('response').textContent = 'Ожидание команды...';
    }

    async function sendRequest() {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('response');
        const loader = document.getElementById('loader');

        if (!key || !text) return alert('Заполните все поля!');

        localStorage.setItem('bauhaus_key', key);
        loader.style.display = 'block';
        out.style.opacity = '0.3';

        try {
            // Используем 1.5-flash — у неё лимиты выше, чем у 2.0
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();

            if (!response.ok) {
                if (data.error?.message.includes('quota')) {
                    throw new Error('Лимит исчерпан. Подождите 30-60 секунд.');
                }
                throw new Error(data.error?.message || 'Ошибка системы');
            }

            out.textContent = data.candidates[0].content.parts[0].text;

        } catch (e) {
            out.innerHTML = `<div class="error-box">🛑 ${e.message}</div>`;
        } finally {
            loader.style.display = 'none';
            out.style.opacity = '1';
        }
    }
</script>

</body>
</html>
