<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini AI Assistant</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }
    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }
    h1 { text-align: center; color: #60a5fa; margin: 0 0 20px 0; font-size: 24px; }

    .key-wrap { position: relative; margin-bottom: 15px; }
    .key-wrap input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      color: #60a5fa;
      padding: 12px 45px 12px 12px;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
    }
    .key-wrap input:focus { border-color: #60a5fa; }
    
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      height: 150px;
      color: #f8fafc;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      outline: none;
      resize: vertical;
      font-size: 15px;
      font-family: inherit;
    }
    textarea:focus { border-color: #60a5fa; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }
    .btn-blue { background: #60a5fa; color: #0f172a; grid-column: span 2; margin-bottom: 5px; }
    .btn-blue:hover { background: #93c5fd; transform: translateY(-1px); }
    .btn-gray { background: #334155; color: white; }
    .btn-gray:hover { background: #475569; }

    #output {
      background: #020617;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #334155;
      margin-top: 20px;
      min-height: 100px;
      white-space: pre-wrap; /* Сохраняет переносы строк */
      font-size: 15px;
      line-height: 1.6;
    }
    .loader {
      color: #fbbf24;
      display: none;
      margin: 10px 0;
      text-align: center;
      font-style: italic;
    }
    .error { color: #f87171; border-color: #ef4444 !important; }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 AI Помощник (Gemini)</h1>

  <div class="key-wrap">
    <input type="password" id="apiKey" placeholder="Вставьте ваш API-ключ (AIza...)">
    <button class="eye-btn" onclick="toggleKey()" id="eyeBtn">👁️</button>
  </div>

  <textarea id="userInput" placeholder="Напишите ваш вопрос здесь..."></textarea>

  <div class="loader" id="loader">⚡ Нейросеть думает...</div>

  <div class="actions">
    <button onclick="askGemini()" class="btn btn-blue">Отправить запрос</button>
    <button onclick="clearAll()" class="btn btn-gray">Очистить всё</button>
    <button onclick="copyResponse()" class="btn btn-gray">Копировать ответ</button>
  </div>

  <div id="output">Здесь появится ответ от нейросети...
