<Bosh #2>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Glass Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2d3436;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h2 { text-align: center; color: #fff; margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 15px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        textarea { height: 120px; resize: none; }

        .btn-send {
            width: 100%;
            background: #2d3436;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send:hover { background: #000; transform: translateY(-2px); }

        .btn-clear {
            width: 100%;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.5);
            margin-top: 10px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        #output {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            min-height: 80px;
            max-height: 300px;
            overflow-y: auto;
            color: #333;
        }

        .loading {
            text-align: center;
            color: #fff;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        .error { color: #d63031 !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>Smart AI</h2>
    
    <input type="password" id="apiKey" value="AIzaSyBuKzQNRJehQSjlWzgMgSSYzYYe_Zehx8I" placeholder="API Key">
    <textarea id="prompt" placeholder="Твой вопрос..."></textarea>
    
    <div id="loader" class="loading">Обработка запроса...</div>
    
    <button class="btn-send" onclick="askAI()">ОТПРАВИТЬ</button>
    <button class="btn-clear" onclick="document.getElementById('prompt').value=''">Очистить поле</button>

    <div id="output">Результат...</div>
</div>

<script>
    async function askAI() {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!text) return alert('Введите текст!');

        loader.style.display = 'block';
        out.textContent = 'Думаю...';
        out.classList.remove('error');

        // Список моделей для проверки (если одна не найдена, пробуем другую)
        const models = ['gemini-1.5-flash-latest', 'gemini-1.5-flash', 'gemini-pro'];
        let success = false;

        for (let model of models) {
            if (success) break;
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();

                if (response.ok) {
                    out.textContent = data.candidates[0].content.parts[0].text;
                    success = true;
                } else if (data.error && data.error.message.includes('not found')) {
                    console.log(`Модель ${model} не найдена, пробуем следующую...`);
                    continue; // Пробуем следующую модель в списке
                } else {
                    throw new Error(data.error?.message || 'Ошибка API');
                }
            } catch (err) {
                out.textContent = '❌ ' + err.message;
                out.classList.add('error');
                break;
            }
        }

        if (!success && !out.classList.contains('error')) {
            out.textContent = '❌ Не удалось найти рабочую модель. Проверьте ключ.';
            out.classList.add('error');
        }
        
        loader.style.display = 'none';
    }
</script>

</body>
</html>
