<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant v3.0</title>
    <style>
        /* Общие стили для предотвращения лагов */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }

        h1 {
            text-align: center;
            color: #60a5fa;
            margin-bottom: 25px;
            font-size: 26px;
        }

        /* Поле ключа с глазком */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: #f8fafc;
            border-radius: 12px;
            padding: 12px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #60a5fa;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 10px;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
        }

        textarea {
            height: 140px;
            resize: none;
            margin-bottom: 20px;
        }

        /* Кнопки */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }

        .btn-main {
            background: #60a5fa;
            color: #0f172a;
            grid-column: span 2;
        }

        .btn-main:hover { background: #93c5fd; }
        .btn-main:active { transform: scale(0.98); }

        .btn-sec {
            background: #334155;
            color: #f8fafc;
        }

        .btn-sec:hover { background: #475569; }

        /* Ответ */
        #status {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #fbbf24;
            display: none;
        }

        #output {
            margin-top: 20px;
            background: #020617;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .error { color: #f87171 !important; border-color: #f87171 !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Gemini AI</h1>

    <div class="input-group">
        <input type="password" id="key" value="AIzaSyBuKzQNRJehQSjlWzgMgSSYzYYe_Zehx8I" placeholder="Вставь свой API Key...">
        <button class="eye-btn" onclick="toggleView()" id="eye">👁️</button>
    </div>

    <textarea id="prompt" placeholder="Твой запрос к нейросети..."></textarea>

    <div id="status">⚡ Нейросеть генерирует ответ...</div>

    <div class="btn-grid">
        <button class="btn btn-main" onclick="askAI()">ОТПРАВИТЬ</button>
        <button class="btn btn-sec" onclick="clearAll()">ОЧИСТИТЬ</button>
        <button class="btn btn-sec" onclick="copyResult()">КОПИРОВАТЬ</button>
    </div>

    <div id="output">Здесь появится результат...</div>
</div>

<script>
    // Показать/скрыть ключ
    function toggleView() {
        const keyInput = document.getElementById('key');
        keyInput.type = keyInput.type === 'password' ? 'text' : 'password';
    }

    // Очистка
    function clearAll() {
        document.getElementById('prompt').value = '';
        const out = document.getElementById('output');
        out.textContent = 'Здесь появится результат...';
        out.classList.remove('error');
    }

    // Копирование
    function copyResult() {
        const text = document.getElementById('output').textContent;
        navigator.clipboard.writeText(text);
        alert('Скопировано!');
    }

    // Главная функция запроса
    async function askAI() {
        const key = document.getElementById('key').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('output');
        const status = document.getElementById('status');

        if (!text) return alert('Введите текст запроса!');

        // Подготовка интерфейса
        status.style.display = 'block';
        out.textContent = 'Ожидание...';
        out.classList.remove('error');
        out.style.opacity = '0.5';

        try {
            // Используем v1beta/gemini-1.5-flash (самый стабильный вариант)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || 'Неизвестная ошибка API');
            }

            const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            out.textContent = aiResponse || 'Нейросеть вернула пустой ответ.';

        } catch (err) {
            out.textContent = '❌ Ошибка: ' + err.message;
            out.classList.add('error');
        } finally {
            status.style.display = 'none';
            out.style.opacity = '1';
        }
    }
</script>

</body>
</html>
