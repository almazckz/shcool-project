<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Lite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0e14;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .glass-panel {
            background: rgba(23, 28, 38, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        h2 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 25px; color: #60a5fa; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #64748b; margin-bottom: 8px; letter-spacing: 1px; }
        
        input, textarea {
            width: 100%;
            background: #020617;
            border: 1px solid #334155;
            color: #fff;
            padding: 14px;
            border-radius: 14px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }
        input:focus, textarea:focus { border-color: #60a5fa; box-shadow: 0 0 15px rgba(96, 165, 250, 0.2); }
        
        textarea { height: 130px; resize: none; }

        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 13px;
        }
        .btn-primary { background: #60a5fa; color: #0b0e14; }
        .btn-primary:hover { background: #93c5fd; transform: translateY(-2px); }
        .btn-secondary { background: #1e293b; color: #94a3b8; }
        .btn-secondary:hover { background: #334155; color: #fff; }

        #output {
            margin-top: 25px;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            border: 1px solid #1e293b;
            min-height: 80px;
            max-height: 350px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
        }
        .loader { text-align: center; display: none; color: #fbbf24; font-size: 12px; margin-bottom: 10px; }
        .error { color: #f87171; border-color: #f87171; }
    </style>
</head>
<body>

<div class="glass-panel">
    <h2>INTELLECT v3</h2>
    
    <div class="input-group">
        <label>Personal API Key</label>
        <input type="password" id="apiKey" placeholder="Вставьте ваш ключ...">
    </div>

    <div class="input-group">
        <label>Prompt</label>
        <textarea id="prompt" placeholder="Напишите сообщение..."></textarea>
    </div>

    <div id="loader" class="loader">Синхронизация с нейросетью...</div>

    <div class="controls">
        <button class="btn btn-primary" onclick="generate()">Запустить</button>
        <button class="btn btn-secondary" onclick="clearPrompt()">Очистить</button>
    </div>

    <div id="output">Готов к работе.</div>
</div>

<script>
    // Подгружаем ключ автоматически
    window.onload = () => {
        const saved = localStorage.getItem('my_gemini_key');
        if (saved) document.getElementById('apiKey').value = saved;
    };

    function clearPrompt() {
        document.getElementById('prompt').value = '';
        document.getElementById('output').textContent = 'Готов к работе.';
    }

    async function generate() {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!key || !text) return alert('Заполни все поля!');

        // Сохраняем ключ
        localStorage.setItem('my_gemini_key', key);

        loader.style.display = 'block';
        out.style.opacity = '0.5';
        out.classList.remove('error');

        try {
            // Используем 1.5 Flash — она стабильнее по лимитам
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || 'Ошибка сервера');
            }

            out.textContent = data.candidates[0].content.parts[0].text;

        } catch (e) {
            out.textContent = '❌ ' + e.message;
            out.classList.add('error');
        } finally {
            loader.style.display = 'none';
            out.style.opacity = '1';
        }
    }
</script>

</body>
</html>
