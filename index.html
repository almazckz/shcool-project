<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Помощник (Hardcoded Key)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }
    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }
    h1 { text-align: center; color: #60a5fa; margin: 0 0 20px 0; }
    
    textarea {
      width: 100%;
      height: 150px;
      color: #f8fafc;
      background: #0f172a;
      border: 1px solid #334155;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      outline: none;
      resize: vertical;
      font-size: 16px;
    }
    textarea:focus { border-color: #60a5fa; }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      background: #60a5fa;
      color: #0f172a;
      font-size: 16px;
      transition: 0.3s;
    }
    .btn:hover { background: #93c5fd; }
    .btn:disabled { background: #475569; cursor: not-allowed; }

    #output {
      background: #020617;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #334155;
      margin-top: 20px;
      min-height: 100px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .status {
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 AI Помощник</h1>
  
  <textarea id="userInput" placeholder="Введите ваш вопрос..."></textarea>
  
  <button onclick="askGemini()" id="sendBtn" class="btn">Отправить запрос</button>
  
  <div class="status" id="status">Ключ активен</div>
  
  <div id="output">Ответ появится здесь...</div>
</div>

<script>
  // ТВОЙ КЛЮЧ УКАЗЫВАЕТСЯ ЗДЕСЬ
  const API_KEY = 'AIzaSyBuKzQNRJehQSjlWzgMgSSYzYYe_Zehx8I'; 

  async function askGemini() {
    const prompt = document.getElementById('userInput').value.trim();
    const output = document.getElementById('output');
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    if (!prompt) return alert('Введите текст!');

    btn.disabled = true;
    status.textContent = 'Думаю...';
    output.textContent = 'Ожидание ответа...';

    try {
      // Используем 1.5-flash, так как она стабильнее для бесплатных ключей
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'Ошибка API');
      }

      output.textContent = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Нет ответа';
      status.textContent = 'Готово';

    } catch (err) {
      output.textContent = '❌ Ошибка: ' + err.message;
      status.textContent = 'Ошибка';
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
