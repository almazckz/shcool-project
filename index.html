<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 AI Помощник</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 15px;
    }
    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }
    h1 { text-align: center; color: #60a5fa; margin: 0 0 20px 0; font-size: 22px; }

    .key-wrap { position: relative; margin-bottom: 15px; }
    .key-wrap input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      color: #60a5fa;
      padding: 12px 40px 12px 12px;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
    }
    .key-wrap button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #60a5fa;
      cursor: pointer;
      font-size: 16px;
    }

    textarea {
      width: 100%;
      height: 120px;
      color: #f8fafc;
      background: #1e293b;
      border: 1px solid #475569;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      outline: none;
      resize: none;
      font-size: 15px;
      font-family: inherit;
    }
    textarea:focus { border-color: #60a5fa; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }
    .btn-blue { background: #60a5fa; color: #0f172a; grid-column: span 2; margin-bottom: 5px; }
    .btn-blue:hover { background: #93c5fd; transform: scale(0.98); }
    .btn-gray { background: #475569; color: white; }
    .btn-gray:hover { background: #64748b; }

    #output {
      background: #020617;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #334155;
      margin-top: 20px;
      min-height: 100px;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.6;
    }
    .loader {
      color: #fbbf24;
      font-size: 14px;
      display: none;
      margin: 10px 0;
      text-align: center;
      font-style: italic;
    }
    .error { color: #f87171; border: 1px solid #f87171 !important; }
  </style>
</head>

</div>
