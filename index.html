<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACID AI STUDIO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #dfff00; /* Кислотный лимонный */
            color: #000;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-card {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px #000;
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            font-size: 35px;
            text-transform: uppercase;
            margin-bottom: 20px;
            line-height: 0.8;
            background: #000;
            color: #dfff00;
            padding: 10px;
            display: inline-block;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; text-transform: uppercase; font-size: 14px; margin-bottom: 5px; }

        input, textarea {
            width: 100%;
            border: 3px solid #000;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }

        textarea { height: 120px; resize: none; font-family: 'Courier New', monospace; }

        .btn {
            width: 100%;
            padding: 20px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.1s;
            margin-bottom: 10px;
        }

        .btn:hover { background: #ff00ff; color: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #000; }
        .btn:active { transform: translate(0, 0); box-shadow: none; }

        .btn-clear { background: #fff; color: #000; border: 3px solid #000; font-size: 14px; padding: 10px; }

        #output {
            margin-top: 20px;
            border: 3px solid #000;
            padding: 15px;
            background: #f0f0f0;
            min-height: 80px;
            max-height: 250px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: pre-wrap;
        }

        .loading { display: none; color: #ff00ff; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>ACID_AI_GEN</h1>

    <div class="input-group">
        <label>Personal Key</label>
        <input type="password" id="apiKey" placeholder="ENTER_API_KEY">
    </div>

    <div class="input-group">
        <label>Input Prompt</label>
        <textarea id="prompt" placeholder="TYPE_COMMAND_HERE..."></textarea>
    </div>

    <div id="loader" class="loading">>>> CONNECTING_TO_BRAIN...</div>

    <button class="btn" onclick="askAI()">Run Command</button>
    <button class="btn btn-clear" onclick="clearAll()">Reset</button>

    <div id="output">SYSTEM_READY...</div>
</div>

<script>
    // Авто-загрузка ключа
    window.onload = () => {
        const key = localStorage.getItem('acid_key');
        if (key) document.getElementById('apiKey').value = key;
    };

    function clearAll() {
        document.getElementById('prompt').value = '';
        document.getElementById('output').textContent = 'SYSTEM_RESET...';
    }

    async function askAI() {
        const key = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!key || !text) return alert('MISSING_DATA!');

        localStorage.setItem('acid_key', key);
        loader.style.display = 'block';
        out.textContent = 'PROCESSING...';

        try {
            // gemini-pro — самая "неубиваемая" модель для ветки v1beta
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || 'API_FAILURE');
            }

            out.textContent = data.candidates[0].content.parts[0].text;

        } catch (e) {
            out.innerHTML = `<span style="color:red">ERROR: ${e.message}</span>`;
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
