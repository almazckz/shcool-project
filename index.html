<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Gemini AI</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.5));
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: #fff;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        textarea {
            height: 150px;
            resize: none;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(188, 19, 254, 0.4);
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.6);
            letter-spacing: 2px;
        }

        .secondary-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .sec-btn {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sec-btn:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        #output {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            border-left: 4px solid var(--neon-purple);
            font-size: 15px;
            line-height: 1.7;
            max-height: 300px;
            overflow-y: auto;
            color: #e0e0e0;
        }

        .loading-text {
            color: var(--neon-blue);
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--neon-blue); }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Cyber Gemini</h1>

    <div class="input-box">
        <input type="password" id="key" value="AIzaSyBuKzQNRJehQSjlWzgMgSSYzYYe_Zehx8I" placeholder="API Key">
    </div>

    <textarea id="prompt" placeholder="Введите команду для ИИ..."></textarea>

    <div id="loader" class="loading-text">СИНХРОНИЗАЦИЯ С НЕЙРОСЕТЬЮ...</div>

    <div class="btn-group">
        <button class="main-btn" onclick="runAI()">Запустить</button>
        <div class="secondary-btns">
            <button class="sec-btn" onclick="document.getElementById('prompt').value=''">Очистить</button>
            <button class="sec-btn" onclick="copyText()">Копировать</button>
        </div>
    </div>

    <div id="output">Консоль готова к работе...</div>
</div>

<script>
    async function runAI() {
        const key = document.getElementById('key').value.trim();
        const text = document.getElementById('prompt').value.trim();
        const out = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!text) return alert('Введите запрос!');

        loader.style.display = 'block';
        out.style.opacity = '0.4';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();

            if (data.error) {
                out.innerHTML = `<span style="color:#ff4d4d">ERROR: ${data.error.message}</span>`;
            } else {
                out.textContent = data.candidates[0].content.parts[0].text;
            }
        } catch (e) {
            out.innerHTML = `<span style="color:#ff4d4d">SYSTEM FAILURE: ${e.message}</span>`;
        } finally {
            loader.style.display = 'none';
            out.style.opacity = '1';
        }
    }

    function copyText() {
        const out = document.getElementById('output').textContent;
        navigator.clipboard.writeText(out);
        alert('Данные скопированы в буфер');
    }
</script>

</body>
</html>
